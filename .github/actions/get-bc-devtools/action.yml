name: Get sources for Microsoft Dynamics Business Central Development Tools
description: Retrieves all available sources for Microsoft Dynamics Business Central Development Tools from VS Marketplace and NuGet, resolves their target frameworks and returns a unified source list.

inputs:
  json-path:
    description: Path to the TargetFramework.json cache file. Defaults to runner temp so the file is never written back to the checkout.
    required: false
    default: ${{ runner.temp }}/TargetFramework.json

outputs:
  sources:
    description: Stringified JSON object of sources for the Microsoft Dynamics Business Central Development Tools
    value: ${{ steps.get-bc-devtools.outputs.sources }}
  tfm-net80-version-lowest:
    description: Lowest AL version for net8.0
    value: ${{ steps.get-bc-devtools.outputs.tfm_net80_version_lowest }}

runs:
  using: composite
  steps:
    - name: Get sources for BC Dev Tools
      id: get-bc-devtools
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'

        # Retrieve all sources
        $sources = & "${{github.action_path}}/Get-BC-DevTools.ps1" -JsonPath "${{ inputs.json-path }}" | ConvertFrom-Json
        Write-Host "Retrieved $($sources.Count) sources for Microsoft Dynamics Business Central Development Tools."

        # Deduplicate by version; prefer NuGet > VSIX > BCArtifact for the same version
        $typePriority = @{ 'NuGet' = 1; 'VSIX' = 2; 'BCArtifact' = 3 }
        $sources = $sources |
            Where-Object { $_.version } |
            Group-Object version |
            ForEach-Object {
                $_.Group | Sort-Object { if ($typePriority.ContainsKey($_.packageType)) { $typePriority[$_.packageType] } else { 99 } } | Select-Object -First 1
            } |
          Where-Object { ([version]$_.version).Major -ge 16 } |
            Sort-Object { [version]$_.version } -Descending

        # Lowest source per TFM
        $net80 = $sources | Where-Object { $_.tfm -eq 'net8.0' -and $_.version } |
                  Sort-Object { [version]($_.version) } |
                  Select-Object -First 1 -ExpandProperty version
        Write-Host "Lowest net8.0 version: $net80"

        # Emit outputs
        $jsonCompressed = $sources | ConvertTo-Json -Compress
        echo "sources=$jsonCompressed" >> $env:GITHUB_OUTPUT
        echo "tfm_net80_version_lowest=$net80" >> $env:GITHUB_OUTPUT

    - name: Display sources
      shell: pwsh
      env:
        SOURCES: ${{ steps.get-bc-devtools.outputs.sources }}
      run: |
        $ErrorActionPreference = 'Stop'
        & "${{github.action_path}}/Display-Sources.ps1"
