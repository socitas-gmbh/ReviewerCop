name: Build and Test

on:
  workflow_call:
    inputs:
      draft-check:
        description: "Whether to check if PR is draft"
        required: false
        type: boolean
        default: true
    outputs:
      bc-devtools-sources:
        description: "BC DevTools sources"
        value: ${{ jobs.setup.outputs.bc-devtools-sources }}
      tfm-net80-version-lowest:
        description: "Target framework net8.0 lowest version"
        value: ${{ jobs.setup.outputs.tfm-net80-version-lowest }}
  workflow_dispatch:

env:
  DOTNET_NOLOGO: true

jobs:
  setup:
    if: ${{ !inputs.draft-check || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    name: Setup
    steps:
      - uses: actions/checkout@v6

      - name: Restore TargetFramework.json cache
        id: restore-tfm-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/TargetFramework.json
          key: tfm-json-${{ github.run_id }}
          restore-keys: tfm-json-

      - name: Get BC DevTools
        id: get-bc-devtools
        uses: ./.github/actions/get-bc-devtools

      - name: Hash TargetFramework.json
        id: hash-tfm
        shell: bash
        run: |
          if [ -f "${{ runner.temp }}/TargetFramework.json" ]; then
            echo "hash=$(sha256sum '${{ runner.temp }}/TargetFramework.json' | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          else
            echo "hash=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Save TargetFramework.json cache
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/TargetFramework.json
          key: tfm-json-${{ steps.hash-tfm.outputs.hash }}

      - name: Setup matrix for test
        id: setup-test-matrix
        uses: ./.github/actions/setup-test-matrix
        with:
          sources: ${{ steps.get-bc-devtools.outputs.sources }}

    outputs:
      bc-devtools-sources: ${{ steps.get-bc-devtools.outputs.sources }}
      tfm-net80-version-lowest: ${{ steps.get-bc-devtools.outputs.tfm-net80-version-lowest }}
      matrix: ${{ steps.setup-test-matrix.outputs.matrix }}

  build:
    if: ${{ !inputs.draft-check || github.event.pull_request.draft == false }}
    needs: setup
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup BC DevTools (v${{ needs.setup.outputs.tfm-net80-version-lowest }})
        uses: ./.github/actions/setup-bc-devtools
        with:
          sources: ${{ needs.setup.outputs.bc-devtools-sources }}
          version-number: ${{ needs.setup.outputs.tfm-net80-version-lowest }}
          target-path: Microsoft.Dynamics.BusinessCentral.Development.Tools/net8.0

      # Socitas.ReviewerCop.Common
      - name: Restore Socitas.ReviewerCop.Common
        run: dotnet restore ./src/Socitas.ReviewerCop.Common/Socitas.ReviewerCop.Common.csproj

      - name: Build Socitas.ReviewerCop.Common
        run: dotnet build ./src/Socitas.ReviewerCop.Common/Socitas.ReviewerCop.Common.csproj --configuration Release --no-restore

      - name: Upload Socitas.ReviewerCop.Common artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Socitas.ReviewerCop.Common
          path: ./src/Socitas.ReviewerCop.Common/bin/Release/

      # Socitas.ReviewerCop
      - name: Restore Socitas.ReviewerCop
        run: dotnet restore ./src/Socitas.ReviewerCop/Socitas.ReviewerCop.csproj

      - name: Build Socitas.ReviewerCop
        run: dotnet build ./src/Socitas.ReviewerCop/Socitas.ReviewerCop.csproj --configuration Release --no-restore

      - name: Upload Socitas.ReviewerCop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Socitas.ReviewerCop
          path: ./src/Socitas.ReviewerCop/bin/Release/

  test:
    if: ${{ !inputs.draft-check || github.event.pull_request.draft == false }}
    needs: [setup, build]
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
    name: Test v${{ matrix.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Setup BC v${{ matrix.version }} DevTools
        id: setup-bc-devtools
        uses: ./.github/actions/setup-bc-devtools
        with:
          sources: ${{ needs.setup.outputs.bc-devtools-sources }}
          version-number: ${{ matrix.version }}
          target-path: Microsoft.Dynamics.BusinessCentral.Development.Tools/net8.0

      # Socitas.ReviewerCop
      - name: Download Socitas.ReviewerCop.Common binaries
        uses: actions/download-artifact@v8
        with:
          name: Socitas.ReviewerCop.Common
          path: ./src/Socitas.ReviewerCop.Common/bin/Release/

      - name: Download Socitas.ReviewerCop binaries
        uses: actions/download-artifact@v8
        with:
          name: Socitas.ReviewerCop
          path: ./src/Socitas.ReviewerCop/bin/Release/

      - name: Restore Socitas.ReviewerCop.Test
        run: dotnet restore ./src/Socitas.ReviewerCop.Test/Socitas.ReviewerCop.Test.csproj /p:NavTargetFramework=${{ matrix.tfm }}

      - name: Run Socitas.ReviewerCop.Test
        run: >
          dotnet test ./src/Socitas.ReviewerCop.Test/Socitas.ReviewerCop.Test.csproj
          -p:NavTargetFramework=${{ matrix.tfm }}
          --no-restore
          --configuration Release
          --results-directory ./TestResults
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=ReviewerCop_AL_${{ matrix.version }}.trx"

      - name: Install dotnet-trx-merge
        if: always()
        run: |
          dotnet tool install --global dotnet-trx-merge

      - name: Merge Test Results
        if: always()
        run: |
          trx-merge --dir ./TestResults/ --output ./TestResults_${{ matrix.version }}.trx

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.version }}
          path: |
            **/TestResults_${{ matrix.version }}.trx

  report:
    if: ${{ always() && (!inputs.draft-check || github.event.pull_request.draft == false) }}
    needs: [setup, build, test]
    runs-on: ubuntu-latest
    name: Report
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all test artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: test-*
          merge-multiple: true

      - name: Publish unified test report
        uses: dorny/test-reporter@v2
        with:
          name: Test results
          report-title: 'Socitas ReviewerCop Test Results'
          path: "**/*.trx"
          reporter: dotnet-trx
          use-actions-summary: 'false'
          list-suites: 'failed'
          list-tests: 'failed'
          collapsed: 'never'
          fail-on-error: true
          fail-on-empty: true
